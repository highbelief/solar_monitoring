<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>520kW급 발전소 모니터링 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script> <!-- Chart.js -->
    <style>
        body {
            display: flex;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        /* 좌측 사이드바 스타일 */
        .sidebar {
            width: 200px;
            background-color: #333;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            margin: 15px 0;
            font-size: 18px;
        }
        .sidebar a:hover {
            color: #ddd;
        }
        /* 콘텐츠 영역 스타일 */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: row;
            padding: 20px;
        }
        /* 그래프와 예측 수치 영역 스타일 */
        #currentPowerChart {
            width: 75%;
            height: 500px;
            max-width: 1000px;
        }
        .predictions {
            margin-left: 20px;
            width: 20%;
        }
        .prediction-item {
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <!-- 좌측 사이드바 -->
    <div class="sidebar">
        <h2>520kW급 발전소 모니터링</h2>
        <a href="/dashboard">대시보드</a>
        <a href="/logs">로그</a>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="content">
        <!-- 현재 발전량 그래프 -->
        <div>
            <h2>현재 발전량 (그래프)</h2>
            <canvas id="currentPowerChart"></canvas>
        </div>

        <!-- 예측 수치 표시 -->
        <div class="predictions">
            <h2>예측 발전량 (수치)</h2>
            {% for row in predictions_data %}
            <div class="prediction-item">
                <strong>{{ row.observation_time.strftime('%Y-%m-%d %H:%M:%S') }}</strong><br>
                예측 발전량: {{ row.predicted_power_generated }} kW<br>
                예측 배터리 상태: {{ row.predicted_battery_level }}%<br>
                장비 상태: {{ row.predicted_equipment_status }}
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
    // Chart.js로 발전량 데이터를 표시
    const ctx = document.getElementById('currentPowerChart').getContext('2d');
    let currentPowerChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '현재 발전량 (kW)',
                data: [],
                borderColor: 'blue',
                fill: false
            }]
        }
    });

    // /api/current_power에서 데이터 가져와 그래프 업데이트
    function updateCurrentPowerChart() {
        fetch('/api/current_power')
            .then(response => response.json())
            .then(data => {
                // 최신 데이터를 우측에 표시하기 위해 데이터를 역순으로 정렬
                const labels = data.map(item => item.time).reverse();
                const values = data.map(item => item.value).reverse();

                // 그래프 데이터 업데이트
                currentPowerChart.data.labels = labels;
                currentPowerChart.data.datasets[0].data = values;
                currentPowerChart.update();
            })
            .catch(error => console.error("Error fetching data:", error));
    }

    // 페이지 로드 시 그래프 데이터 로드
    updateCurrentPowerChart();
</script>

</body>
</html>
